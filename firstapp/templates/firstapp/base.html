<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple CRM</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f1ea;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #0f766e;
            --accent-2: #134e4a;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
                linear-gradient(180deg, #faf7f2 0%, var(--bg) 100%);
            min-height: 100vh;
        }

        .shell {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .hero {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.06);
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 3.4rem);
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            max-width: 60ch;
            line-height: 1.6;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .button {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 999px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-weight: 700;
            border: 0;
            cursor: pointer;
        }

        .button:hover { background: var(--accent-2); }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        th {
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .pill {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.12);
            color: var(--accent-2);
            font-size: 0.85rem;
            font-weight: 700;
        }

        .empty {
            padding: 32px 0;
            color: var(--muted);
            text-align: center;
        }

        .form-grid {
            display: grid;
            gap: 16px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font: inherit;
            background: #fff;
        }

        .errorlist {
            margin: 8px 0 0;
            padding-left: 18px;
            color: #b91c1c;
        }

        .backlink {
            color: var(--accent-2);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="shell">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
